<section class="location-section">
  <div class="container">
    <div class="location-section__inner">

      <!-- Левая часть с текстом -->
      <div class="location-section__content">
        <h2 class="location-section__title">Your nearest restaurants</h2>
        <p class="location-section__desc">
          Each kitchen works with its own delivery area<br>
          to deliver food to you as soon as possible
        </p>
      </div>

      <!-- Правая часть с формой -->
      <form action="#" class="location-section__form address-form">
        <div class="address-form__input-wrapper">
          <!-- Иконка маркера (пина) -->
          <svg class="address-form__icon" width="16" height="20" viewBox="0 0 16 20" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M8 0C3.58 0 0 3.58 0 8C0 14 8 20 8 20C8 20 16 14 16 8C16 3.58 12.42 0 8 0ZM8 11C6.34 11 5 9.66 5 8C5 6.34 6.34 5 8 5C9.66 5 11 6.34 11 8C11 9.66 9.66 11 8 11Z"
              fill="#B9BDC4" />
          </svg>
          <input type="text" class="address-form__input" placeholder="Enter delivery address" required>
        </div>
        <button type="submit" class="address-form__btn">send</button>
      </form>

    </div>
  </div>
</section>
