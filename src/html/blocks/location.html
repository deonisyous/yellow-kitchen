<section class="location-section">
  <div class="container">
    <div class="location-section__inner">

      <!-- Левая часть с текстом -->
      <div class="location-section__content">
        <h2 class="location-section__title">Your nearest restaurants</h2>
        <p class="location-section__desc">
          Each kitchen works with its own delivery area<br>
          to deliver food to you as soon as possible
        </p>
      </div>

      <!-- Правая часть с формой -->
      <form action="#" class="location-section__form address-form">
        <input type="email" class="address-form__input" placeholder="Enter delivery address" required>
        <button type="submit" class="address-form__btn">send</button>
      </form>

    </div>
  </div>
</section>
