<section class="container restaurants-section">
  <header class="section-header">
    <h2 class="section-title">Restaurants</h2>
    <button class="show-all-btn">show all</button>
  </header>
  <div class="carousel-container">
    <button class="nav-btn prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>
    <div class="cards-wrapper">
      <article class="card">
        <img src="burger.jpg" alt="Burger" class="card-image">
        <div class="card-logo-container">
          <img src="burger-dlice-logo.png" alt="Burger D'Lice" class="card-logo">
        </div>
      </article>
      <article class="card">
        <img src="risotto.jpg" alt="Risotto" class="card-image">
        <div class="card-logo-container">
          <img src="il-pastificio-logo.png" alt="Il Pastificio" class="card-logo">
        </div>
      </article>
      <article class="card">
        <img src="salad.jpg" alt="Salad" class="card-image">
        <div class="card-logo-container">
          <img src="believe-logo.png" alt="Believe Restaurant Veggie" class="card-logo">
        </div>
      </article>
      <article class="card">
        <img src="asian-food.jpg" alt="Asian Food" class="card-image">
        <div class="card-logo-container">
          <img src="vietnamese-bo-logo.png" alt="Vietnamese Bō Urban Food" class="card-logo">
        </div>
      </article>
    </div>
    <button class="nav-btn next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7" />
      </svg>
    </button>
  </div>
</section>
