<section class="container restaurants-section">
	<div class="restaurant__section-header header-content-item">
		<h2 class="section-title">Restaurants</h2>
		<button class="show-all-btn">show all</button>
	</div>

	<div id="restaurants-splide" class="splide">
		<div class="splide__track">
			<ul class="splide__list">
				<li class="splide__slide">
					<article class="card">
						<img
							src="../../img/restaurants/burger.jpg"
							alt="Burger"
							class="card-image"
						/>
						<div class="card-logo-container">
							<img
								src="../../img/restaurants/logos/burger-dlice.png"
								alt="Burger D'Lice"
								class="card-logo"
							/>
						</div>
					</article>
				</li>

				<li class="splide__slide">
					<article class="card">
						<img
							src="../../img/restaurants/risotto.jpg"
							alt="Risotto"
							class="card-image"
						/>
						<div class="card-logo-container">
							<img
								src="../../img/restaurants/logos/il-pastificio.png"
								alt="Il Pastificio"
								class="card-logo"
							/>
						</div>
					</article>
				</li>

				<li class="splide__slide">
					<article class="card">
						<img src="../../img/restaurants/salad.jpg" alt="Salad" class="card-image" />
						<div class="card-logo-container">
							<img
								src="../../img/restaurants/logos/believe.png"
								alt="Believe"
								class="card-logo"
							/>
						</div>
					</article>
				</li>

				<li class="splide__slide">
					<article class="card">
						<img
							src="../../img/restaurants/asian-food.jpg"
							alt="Asian Food"
							class="card-image"
						/>
						<div class="card-logo-container">
							<img
								src="../../img/restaurants/logos/vietnamese.png"
								alt="Vietnamese Bō"
								class="card-logo"
							/>
						</div>
					</article>
				</li>
			</ul>
		</div>
	</div>
</section>
